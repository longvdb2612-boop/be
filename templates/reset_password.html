<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeMoney Campus | Đặt Lại Mật Khẩu</title>
    
    <!-- CSS and Fonts -->
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .auth-error-alert {
            display: none;
            padding: 0.85rem 1.25rem;
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Network Particles Canvas -->
    <div id="particles-js" style="position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -3; pointer-events: none;"></div>
    
    <!-- Subtle Grid Scan background -->
    <div class="grid-bg"></div>
    
    <!-- Mouse Spotlight glow background -->
    <div class="mouse-glow"></div>

    <!-- Glow BGs -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <header class="app-header">
        <div class="container header-container">
            <a href="/" class="logo-box" style="text-decoration: none; color: inherit;">
                <i class="fa-solid fa-shield-halved"></i>
                <div class="logo-text">SafeMoney<span> Campus</span></div>
            </a>
            <div class="header-stats">
                <a href="/" class="stat-tag coins" style="text-decoration: none;">
                    <i class="fa-solid fa-house"></i> Trang chủ
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="auth-wrapper">
            <div class="auth-card glass-panel" style="padding: 3rem 2.5rem;">
                <h2 style="font-family: var(--font-heading); font-size: 1.5rem; margin-bottom: 0.5rem; text-align: center;">Đặt lại mật khẩu mới</h2>
                <p style="color: var(--text-secondary); font-size: 0.8rem; text-align: center; margin-bottom: 2rem;">Thiết lập mật khẩu bảo vệ tài khoản mới cho SafeMoney Campus.</p>
                
                <div class="auth-error-alert" id="auth-alert"></div>

                <form id="form-reset-pw" class="auth-form-panel active">
                    <input type="hidden" id="reset-token" value="{{ token }}">
                    
                    <div class="slider-group">
                        <label class="form-label-auth" for="new-pass">Mật khẩu mới:</label>
                        <input type="password" id="new-pass" class="form-input-auth" placeholder="Mật khẩu từ 6 ký tự..." required minlength="6">
                    </div>
                    
                    <div class="slider-group">
                        <label class="form-label-auth" for="confirm-pass">Xác nhận mật khẩu:</label>
                        <input type="password" id="confirm-pass" class="form-input-auth" placeholder="Nhập lại mật khẩu..." required minlength="6">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="justify-content: center; margin-top: 1rem;" id="reset-submit-btn">
                        <span>Cập nhật mật khẩu</span> <i class="fa-solid fa-key"></i>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="/static/effects.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('form-reset-pw');
            const alertBox = document.getElementById('auth-alert');
            
            function showAlert(msg, isSuccess = false) {
                alertBox.textContent = msg;
                alertBox.style.display = 'block';
                if (isSuccess) {
                    alertBox.style.background = 'rgba(16, 185, 129, 0.1)';
                    alertBox.style.color = '#34d399';
                    alertBox.style.borderColor = 'rgba(16, 185, 129, 0.2)';
                } else {
                    alertBox.style.background = 'rgba(239, 68, 68, 0.1)';
                    alertBox.style.color = '#f87171';
                    alertBox.style.borderColor = 'rgba(239, 68, 68, 0.2)';
                }
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                alertBox.style.display = 'none';

                const token = document.getElementById('reset-token').value;
                const password = document.getElementById('new-pass').value;
                const confirmPassword = document.getElementById('confirm-pass').value;
                const submitBtn = document.getElementById('reset-submit-btn');

                if (password !== confirmPassword) {
                    showAlert("Mật khẩu xác nhận không khớp!");
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.querySelector('span').textContent = 'Đang cập nhật...';

                try {
                    const response = await fetch('/api/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, password })
                    });
                    const resData = await response.json();

                    if (!response.ok) {
                        showAlert(resData.error || 'Yêu cầu không hợp lệ hoặc đã hết hạn!');
                        submitBtn.disabled = false;
                        submitBtn.querySelector('span').textContent = 'Cập nhật mật khẩu';
                        return;
                    }

                    showAlert("Đặt lại mật khẩu thành công! Bạn sẽ được chuyển hướng sang trang đăng nhập.", true);
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2500);

                } catch (err) {
                    showAlert("Lỗi kết nối máy chủ! Vui lòng thử lại sau.");
                    submitBtn.disabled = false;
                    submitBtn.querySelector('span').textContent = 'Cập nhật mật khẩu';
                }
            });
        });
    </script>
</body>
</html>
